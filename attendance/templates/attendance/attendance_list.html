<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance List | Attendance Management</title>
    <style>
        /* Consistent Theme Variables */
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --accent-color: #4cc9f0;
            --light-color: #f8f9fa;
            --dark-color: #212529;
            --success-color: #4bb543;
            --error-color: #d9534f;
            --text-color: #2b2d42;
            --text-light: #8d99ae;
            --border-radius: 8px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 2rem;
            color: var(--text-color);
        }

        .container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            padding: 2.5rem;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            color: var(--secondary-color);
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            background: linear-gradient(to right, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .code-info {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }

        .attendance-list {
            list-style: none;
        }

        .attendance-list li {
            padding: 1rem;
            margin-bottom: 0.5rem;
            background-color: var(--light-color);
            border-radius: var(--border-radius);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        .attendance-list li:hover {
            transform: translateX(5px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .attendance-list li.empty {
            background-color: transparent;
            color: var(--text-light);
            justify-content: center;
            font-style: italic;
        }

        .user-email {
            font-weight: 500;
            color: var(--secondary-color);
        }

        .marked-time {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 2rem 1.5rem;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .attendance-list li {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Attendance List for Code: {{ attendance_code.code }}</h1>
        <p class="code-info">Generated by: {{ attendance_code.created_by.username }}</p>
        
        <ul class="attendance-list">
            {% for record in attendance_records %}
                <li>
                    <span class="user-email">{{ record.user.email }}</span>
                    <span class="marked-time">Marked at {{ record.marked_at }}</span>
                </li>
            {% empty %}
                <li class="empty">No attendance marked yet.</li>
            {% endfor %}
        </ul>
    </div>

    <script>
        console.log("Current Attendance Code:", "{{ attendance_code.code }}");
    </script>
</body>
</html>
